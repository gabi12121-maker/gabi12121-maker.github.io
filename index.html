<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSG ULTRA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#0f0f0f;color:white}
header{display:flex;justify-content:space-between;padding:20px;background:#111}
.logo{color:#00ffcc;font-size:22px;font-weight:bold}
nav a{color:white;margin-left:15px;text-decoration:none}
.hero{text-align:center;padding:100px 20px}
.btn{padding:10px 20px;background:#00ffcc;border:none;border-radius:8px;cursor:pointer}
.cards{display:flex;gap:20px;padding:20px}
.card{flex:1;background:#1a1a1a;padding:20px;border-radius:10px}
.login-box{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#111;padding:20px;border-radius:10px}
.post-box{display:none;padding:20px}
textarea{width:100%;height:100px;margin-top:10px}
.post{background:#222;margin-top:10px;padding:10px;border-radius:8px}
</style>
</head>
<body>
<header>
<div class="logo">RSG ULTRA</div>
<nav>
<a href="#">Home</a>
<a href="#" onclick="openLogin()">Login</a>
</nav>
</header><section class="hero">
<h1>Welcome to RSG</h1>
<p>Admin Control Panel + Posts</p>
</section><div class="login-box" id="loginBox">
<h3>Login</h3>
<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br><br>
<button class="btn" onclick="login()">Login</button>
</div><div class="post-box" id="postBox">
<h3>Create Post</h3>
<textarea id="postText" placeholder="Write something..."></textarea>
<button class="btn" onclick="addPost()">Post</button>
<div id="posts"></div>
</div><script>
let accounts=[
  {user:"admin1",pass:"1234"},
  {user:"admin2",pass:"abcd"},
  {user:"owner",pass:"rsg"}
];

function openLogin(){
  document.getElementById('loginBox').style.display='block';
}

function login(){
  let u=document.getElementById('user').value.trim();
  let p=document.getElementById('pass').value.trim();

  let ok=false;
  for(let acc of accounts){
    if(acc.user===u && acc.pass===p){
      ok=true;
    }
  }

  if(ok){
    alert('Login successful');
    document.getElementById('loginBox').style.display='none';
    document.getElementById('postBox').style.display='block';
  }else{
    alert('Wrong login');
  }
}

function addPost(){
  let text=document.getElementById('postText').value;
  if(text==='') return;

  let div=document.createElement('div');
  div.className='post';
  div.innerText=text;

  document.getElementById('posts').prepend(div);
  document.getElementById('postText').value='';
}
</script></body>
</html>
