<!DOCTYPE html><html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSG studio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif}
body{
  background: linear-gradient(135deg,#0f0f0f,#1a1a1a);
  color:white;
  overflow-x:hidden;
}
header{
  display:flex;
  justify-content:space-between;
  padding:20px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
}
.logo{font-size:24px;font-weight:bold;color:#00ffcc}
nav a{
  color:white;
  margin-left:20px;
  text-decoration:none;
  transition:0.3s;
}
nav a:hover{color:#00ffcc}
.hero{
  height:90vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}
.hero h1{
  font-size:60px;
  background:linear-gradient(90deg,#00ffcc,#00aaff);
  -webkit-background-clip:text;
  color:transparent;
}
.hero p{margin-top:10px;color:#ccc}
.btn{
  margin-top:20px;
  padding:12px 30px;
  border:none;
  background:#00ffcc;
  color:black;
  font-weight:bold;
  cursor:pointer;
  border-radius:10px;
  transition:0.3s;
}
.btn:hover{
  transform:scale(1.1);
  background:#00aaff;
}
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:40px;
}
.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:15px;
  transition:0.3s;
}
.card:hover{
  transform:translateY(-10px);
  background:rgba(0,255,204,0.1);
}
.login-box{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:#111;
  padding:30px;
  border-radius:15px;
  transition:0.3s;
}
.login-box.active{transform:translate(-50%,-50%) scale(1)}
input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:5px;
}
footer{
  text-align:center;
  padding:20px;
  color:#777;
}
</style>
</head>
<body>
<header>
<div class="logo">RSG studio</div>
<nav>
<a href="#">Home</a>
<a href="#">Tools</a>
<a href="#">Contact</a>
<a href="#" onclick="openLogin()">Login</a>
</nav>
</header><section class="hero">
<h1>WELCOME TO RSG</h1>
<p>Cel mai smecher site facut de tine</p>
<button class="btn" onclick="alert('Ai apasat pe buton ')">Start</button>
</section><section class="cards">
<div class="card">Scripturi JS</div>
<div class="card">Hack UI</div>
<div class="card">Proiecte</div>
</section><div class="login-box" id="loginBox">
<h2>Login</h2>
<input type="text" id="user" placeholder="Username">
<input type="password" id="pass" placeholder="Password">
<button class="btn" onclick="login()">Login</button>
</div><footer>
© 2026 RSG studio
</footer><script>
let accounts=[
  {user:"admin1",pass:"1234"},
  {user:"admin2",pass:"abcd"},
  {user:"owner",pass:"rsg"}
];

function openLogin(){
  document.getElementById('loginBox').classList.add('active');
}

function login(){
  let u=document.getElementById('user').value;
  let p=document.getElementById('pass').value;

  let ok=accounts.find(acc=>acc.user===u && acc.pass===p);

  if(ok){
    alert("Login reusit ");
    document.body.style.background="linear-gradient(135deg,#001f1f,#003333)";
  }else{
    alert("Cont gresit ");
  }
}
</script></body>
</html>
